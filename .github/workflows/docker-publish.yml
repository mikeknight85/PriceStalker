name: Publish Docker Images

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'remotescraper/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/workspace-verify.yml
    permissions:
      contents: read

  changes:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      remotescraper: ${{ steps.filter.outputs.remotescraper }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/docker-image.yml'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/docker-image.yml'
            remotescraper:
              - 'remotescraper/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/docker-image.yml'

  publish-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/docker-image.yml
    permissions:
      contents: read
      packages: write
    with:
      image: ghcr.io/${{ github.repository_owner }}/pricestalker-backend
      dockerfile: ./backend/Dockerfile
      cache-scope: backend
      publish: true
      channel: ${{ startsWith(github.ref, 'refs/tags/v') && 'stable' || 'beta' }}

  publish-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/docker-image.yml
    permissions:
      contents: read
      packages: write
    with:
      image: ghcr.io/${{ github.repository_owner }}/pricestalker-frontend
      dockerfile: ./frontend/Dockerfile
      cache-scope: frontend
      publish: true
      channel: ${{ startsWith(github.ref, 'refs/tags/v') && 'stable' || 'beta' }}

  publish-remotescraper:
    needs: changes
    if: needs.changes.outputs.remotescraper == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/docker-image.yml
    permissions:
      contents: read
      packages: write
    with:
      image: ghcr.io/${{ github.repository_owner }}/pricestalker-remotescraper
      dockerfile: ./remotescraper/Dockerfile
      cache-scope: remotescraper
      publish: true
      channel: ${{ startsWith(github.ref, 'refs/tags/v') && 'stable' || 'beta' }}
