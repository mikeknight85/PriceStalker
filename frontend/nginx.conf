server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 50M;

    # Proxy API requests to backend
    location /api {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for slow scraping
        proxy_connect_timeout 150s;
        proxy_send_timeout 150s;
        proxy_read_timeout 150s;
    }

    # Proxy debug HTML files to backend
    location /debug_files {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Serve static files and handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Prevent caching of the index.html itself
        if ($request_uri ~* ^/index\.html$|^/$) {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }

    # Unversioned assets live at stable paths, so they must NOT be immutable:
    # the filename never changes when the content does. Marking them immutable
    # means a new logo, manifest or service worker never reaches anyone who has
    # already loaded the site -- their browser will not even revalidate.
    # These are small and revalidate cheaply with an ETag.
    location ~* ^/(icon\.svg|ghost\.svg|manifest\.json|version\.json|sw\.js|favicon\.ico)$ {
        expires -1;
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    # Build output is content-hashed by Vite (index-<hash>.js), so the filename
    # changes whenever the content does. Safe to cache forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else static: cache, but allow revalidation.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }
}
