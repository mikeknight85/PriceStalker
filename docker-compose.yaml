services:
  priceghost-db:
    image: postgres:16-alpine
    container_name: priceghost-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: development_password
      POSTGRES_DB: priceghost
      TZ: Australia/Perth
    volumes:
      - ./db-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      priceghost_net:
        ipv4_address: 172.16.5.12
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d priceghost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: priceghost-backend
    dns:
      - 1.1.1.1
      - 1.0.0.1
    mem_limit: 1g
    restart: unless-stopped
    ports:
      - "3003:3001"
    volumes:
      - ./backend/debug_html:/app/backend/debug_html
      - ./logs:/app/backend/logs
    environment:
      - DATABASE_URL=postgresql://postgres:development_password@priceghost-db:5432/priceghost
      - JWT_SECRET=change_this_to_a_secure_random_string
      - ADMIN_API_TOKEN=development_admin_token_2026
      - PORT=3001
      - NODE_ENV=production
      - TZ=Australia/Perth
      - DEBUG=true
      - LOG_LEVEL=debug
      - SMTP_FALLBACK_HOST=mail.example.com
      - SMTP_FALLBACK_PORT=25
      - SMTP_FALLBACK_FROM=admin@example.com
      - ADMIN_ALERT_EMAIL=admin@example.com
    networks:
      priceghost_net:
        ipv4_address: 172.16.5.3
    depends_on:
      priceghost-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  priceghost-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: priceghost-frontend
    restart: unless-stopped
    ports:
      - "5003:80"
    environment:
      - TZ=Australia/Perth
    networks:
      priceghost_net:
        ipv4_address: 172.16.5.11
    depends_on:
      - backend

networks:
  priceghost_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.5.0/24
